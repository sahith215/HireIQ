services:
  - type: web
    name: hireiq-app
    env: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      # ⚠️ Set these in the Render dashboard — never hardcode real values here
      - key: N8N_URL
        sync: false   # e.g. https://your-n8n-instance.com/webhook/resume_upload
      - key: GOOGLE_API_KEY
        sync: false   # Your Google AI / Gemini API key
